# Genetics Database
# =================
# Static data - populated once from genetic testing (23andMe, Nebula, etc.)
# Consumed by: @cmo agent for risk stratification

metadata:
  source: null  # 23andMe, Nebula Genomics, etc.
  test_date: null

# === HIGH IMPACT (Materially affects strategy) ===
high_impact:
  apoe:
    genotype: null  # E2/E2, E2/E3, E2/E4, E3/E3, E3/E4, E4/E4
    risk_level: null  # low | moderate | elevated | high
    implications: []
    # E3/E4 or E4/E4 examples:
    # - "ApoB target: <40 mg/dL (aggressive)"
    # - "Saturated fat limit: <10g/day"
    # - "Cardio priority: elevated (neuroprotective)"
    # - "Consider earlier cognitive screening"

  lp_a_genetic:
    # Lp(a) is 90% genetic, testing once is enough
    elevated: null  # true | false
    risk_level: null
    implications: []
    # If elevated:
    # - "Cannot lower with lifestyle"
    # - "Focus on aggressive LDL-C/ApoB management"
    # - "Consider Lp(a)-specific therapies when available"

