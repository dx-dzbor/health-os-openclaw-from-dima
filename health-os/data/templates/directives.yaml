# === 1. CONSTRAINTS (Hard Limits - Must Obey) ===
constraints:
  nutrition:
    # Cardiovascular (if ApoB/Lp(a) elevated)
    saturated_fat_limit_g: null
    # Metabolic (if insulin resistant)
    added_sugar_limit_g: null
    # Alcohol policy: "Zero Tolerance" | "Limited" | "None"
    alcohol_policy: null
    # Omega-3 requirement
    omega3_minimum_g: null
    # Fiber (metabolic health)
    fiber_minimum_g: null

  training:
    # Zone 2 cardio floor
    min_zone2_minutes_week: null
    # VO2max sessions
    min_vo2max_sessions_week: null
    # Strength floor (maintenance)
    min_strength_sessions_week: null
    # Banned patterns (injury, temporary contraindication)
    banned_patterns: []
    # Banned exercises (specific)
    banned_exercises: []
    # Temporary restrictions (from discomfort protocol)
    temporary_avoid: []
    # Example:
    #   - exercise: deadlift
    #     reason: "lower_back discomfort"
    #     until: 2026-02-05

  # === COGNITIVE CONSTRAINTS (activate if cognitive mode weight >= 3) ===
  cognitive:
    # Glucose stability for focus
    prefer_protein_first_meal: null
    avoid_high_gi_before_work: null

    # Caffeine window (sleep protection + adenosine)
    caffeine_after_hour: null
    caffeine_before_hours_sleep: null

    # Training timing for BDNF
    morning_exercise_recommended: null
    pre_work_exercise_duration_max_min: null

    # Sleep priority
    sleep_priority: null  # high | normal

    # Quick interventions
    allowed_interventions: []
    # Options: cold_exposure_morning, post_meal_walk, nsdr_afternoon

  sleep:
    # Quantity
    target_hours_min: 7
    target_hours_optimal: 8.5

    # Regularity (HIGHEST PRIORITY - 2x mortality prediction vs duration)
    bedtime_variance_max_min: 30
    wake_time_variance_max_min: 30

    # Quality
    sleep_efficiency_min: 0.85

    # Environment
    room_temp_celsius: 18.5  # 67F optimal

    # Substance cutoffs (REM/deep sleep protection)
    caffeine_cutoff_hours: 10
    alcohol_policy: "avoid_nightly"
    last_meal_before_sleep_min: 45

    # Hygiene
    no_work_in_bed: true
    evening_darkness_start_hours_before: 1

  sauna:
    # Frequency (dose-dependent mortality reduction)
    min_sessions_week: 4
    target_sessions_week: 5

    # Duration (19+ min shows robust benefits)
    min_duration_min: 20
    target_duration_min: 25

    # Temperature
    temp_celsius_min: 79
    temp_celsius_target: 85
    humidity_percent: 15

    # Safety
    max_duration_min: 30
    cooldown_before_cold_min: 3
    hydration_required: true

    # Contraindications
    avoid_with_alcohol: true
    avoid_if_pregnant: true
    avoid_with_acute_cardiac: true

    # Alternative (if no sauna access)
    hot_bath_temp_celsius: 40
    hot_bath_duration_min: 20

